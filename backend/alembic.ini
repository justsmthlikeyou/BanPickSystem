# A generic, single database configuration.

[alembic]
# Path to migration scripts, relative to this file's location (backend/)
script_location = migrations

# SQLAlchemy connection URL is read dynamically from the app's config in env.py
# so this line is intentionally left as a placeholder.
sqlalchemy.url = sqlite:///./genshin_draft.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
